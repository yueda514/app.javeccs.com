            )}
            <div>
              <button onClick={() => setTab("schedule")} style={{ width: "100%", padding: 14, borderRadius: 10, border: `2px solid ${THEME.gold}`, background: "transparent", color: THEME.goldLight, fontWeight: 700, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                <Calendar size={18} />{l.viewSchedule}
              </button>
            </div>
          </div>
          <div style={{ padding: "20px 16px 0" }}>
            {/* Mailing List CTA */}
            <button style={{ width: "100%", padding: 14, borderRadius: 10, border: "none", background: `linear-gradient(135deg, ${THEME.gold}, #b89840)`, color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer", marginBottom: 20, boxShadow: "0 2px 8px rgba(201,168,76,0.3)" }}>{l.mailingList}</button>
            {/* Quick Info */}
            <div style={S.sectionTitle}>{l.quickInfo}</div>
            {[
              { icon: <MapPin size={18} color={THEME.gold} />, title: l.venue, sub: l.accessDetails },
              { icon: <Clock size={18} color={THEME.gold} />, title: l.registration, sub: l.regDesk },
              { icon: <Users size={18} color={THEME.gold} />, title: l.social, sub: l.socialInfo },
            ].map((item, i) => (
              <div key={i} style={{ ...S.card, display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 40, height: 40, borderRadius: 10, background: THEME.goldBg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{item.icon}</div>
                <div><div style={{ fontSize: 14, fontWeight: 700, color: THEME.tealDark }}>{item.title}</div><div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{item.sub}</div></div>
              </div>
            ))}
            {/* Footer */}
            <div style={{ background: THEME.tealDark, borderRadius: "16px 16px 0 0", padding: "24px 20px 16px", marginTop: 16 }}>
              <div style={{ textAlign: "center" }}>
                <img src={LOGO_WHITE} alt="JaVECCS" style={{ height: 36, marginBottom: 12 }} />
                <div style={{ fontSize: 12, color: THEME.textLight, lineHeight: 1.6, marginBottom: 12 }}>{l.hostedBy}</div>
                <div style={{ width: 40, height: 2, background: THEME.gold, margin: "0 auto 12px", borderRadius: 1 }} />
                <div style={{ fontSize: 11, color: THEME.textMuted, marginBottom: 4 }}>support@javeccs.org</div>
                <div style={{ fontSize: 11, color: THEME.textMuted, marginBottom: 4 }}>www.javeccs.com</div>
                <div style={{ fontSize: 10, color: THEME.textMuted, marginTop: 8, opacity: 0.6 }}>&copy; 2027 JaVECCS. All rights reserved.</div>
              </div>
            </div>
          </div>
        </div>
      );

      // ─── Tab: Schedule ───────────────────────────────────────────
      const renderSchedule = () => (
        <div style={{ padding: 16, paddingBottom: 80 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#fff", borderRadius: 10, padding: "10px 12px", marginBottom: 12, border: "1px solid #e0dcd4" }}>
            <Search size={16} color={THEME.textMuted} />
            <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder={l.search} style={{ flex: 1, border: "none", outline: "none", fontSize: 14, background: "transparent", fontFamily: "inherit" }} />
            {searchQuery && <button onClick={() => setSearchQuery("")} style={{ background: "none", border: "none", cursor: "pointer", padding: 0 }}><X size={16} color={THEME.textMuted} /></button>}
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 12, overflowX: "auto" }}>
            {l.days.map((day, i) => (
              <button key={i} onClick={() => { setSelectedDay(i); setShowFavorites(false); }} style={{ padding: "8px 14px", borderRadius: 20, border: "none", fontSize: 12, fontWeight: 600, background: !showFavorites && selectedDay === i ? THEME.teal : "#e0dcd4", color: !showFavorites && selectedDay === i ? "#fff" : "#475569", cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>{day}</button>
            ))}
            <button onClick={() => setShowFavorites(!showFavorites)} style={{ padding: "8px 14px", borderRadius: 20, border: "none", fontSize: 12, fontWeight: 600, background: showFavorites ? THEME.gold : "#e0dcd4", color: showFavorites ? "#fff" : "#475569", cursor: "pointer", whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}><Star size={12} fill={showFavorites ? "#fff" : "none"} />{l.favorites}</button>
          </div>
          {!showFavorites && (
            <div style={{ display: "flex", gap: 6, marginBottom: 16, overflowX: "auto" }}>
              {[{ key: "all", label: l.allRooms }, ...Object.entries(l.tracks).map(([k, v]) => ({ key: k, label: v }))].map(({ key, label }) => (
                <button key={key} onClick={() => setSelectedTrack(key)} style={{ padding: "6px 12px", borderRadius: 16, fontSize: 11, fontWeight: 600, border: selectedTrack === key ? `2px solid ${trackColors[key] || THEME.teal}` : "1px solid #e0dcd4", background: selectedTrack === key ? `${trackColors[key] || THEME.teal}11` : "#fff", color: selectedTrack === key ? trackColors[key] || THEME.teal : "#64748b", cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>{label}</button>
              ))}
            </div>
          )}
          {filteredSessions.length === 0 ? (
            <div style={{ textAlign: "center", padding: 40, color: THEME.textMuted }}>{showFavorites ? l.noFavorites : l.noResults}</div>
          ) : filteredSessions.map((s) => {
            const sp = s.speakerId ? getSpeaker(s.speakerId) : null;
            const isFav = favorites.includes(s.id);
            return (
              <div key={s.id} style={{ ...S.card, padding: 0, overflow: "hidden" }}>
                <div style={{ display: "flex" }}>
                  <div style={{ width: 4, background: trackColors[s.track] || THEME.textMuted, flexShrink: 0 }} />
                  <div style={{ flex: 1, padding: "12px 14px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}><Badge label={l[s.type]} colorSet={typeColors[s.type]} /><span style={{ fontSize: 11, color: THEME.textMuted }}>{l.tracks[s.track]}</span></div>
                      <button onClick={(e) => { e.stopPropagation(); toggleFavorite(s.id); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 2 }}><Star size={18} color={isFav ? THEME.gold : "#d1d5db"} fill={isFav ? THEME.gold : "none"} /></button>
                    </div>
                    <div onClick={() => setSelectedSession(s)} style={{ cursor: "pointer" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: THEME.tealDeep, marginBottom: 4, lineHeight: 1.4 }}>{s.title[lang]}</div>
                      <div style={{ fontSize: 12, color: "#64748b", display: "flex", alignItems: "center", gap: 4, marginBottom: sp ? 8 : 0 }}><Clock size={12} />{s.time}</div>
                      {sp && <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}><Avatar initials={sp.avatar} color={sp.color} size={28} /><div><div style={{ fontSize: 12, fontWeight: 600, color: "#334155" }}>{sp.name[lang]}</div><div style={{ fontSize: 11, color: THEME.textMuted }}>{sp.affiliation[lang]}</div></div></div>}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );

      // ─── Tab: Speakers ───────────────────────────────────────────
      const renderSpeakers = () => (
        <div style={{ padding: 16, paddingBottom: 80 }}>
          <div style={S.sectionTitle}>{l.nav.speakers} ({speakers.length})</div>
          {speakers.map((sp) => (
            <div key={sp.id} onClick={() => setSelectedSpeaker(sp)} style={{ ...S.card, display: "flex", alignItems: "center", gap: 14, cursor: "pointer" }}>
              <Avatar initials={sp.avatar} color={sp.color} size={50} />
              <div style={{ flex: 1 }}><div style={{ fontSize: 15, fontWeight: 700, color: THEME.tealDeep }}>{sp.name[lang]}</div><div style={{ fontSize: 13, color: "#64748b" }}>{sp.affiliation[lang]}</div><div style={{ marginTop: 4 }}><Badge label={sp.specialty[lang]} colorSet={typeColors.invited} /></div></div>
              <ChevronRight size={18} color={THEME.textMuted} />
            </div>
          ))}
        </div>
      );

      // ─── Tab: Venue ──────────────────────────────────────────────
      const renderVenue = () => (
        <div style={{ padding: 16, paddingBottom: 80 }}>
          <div style={S.sectionTitle}>{l.nav.venue}</div>
          <div style={{ ...S.card, padding: 0, overflow: "hidden" }}>
            <div style={{ height: 160, background: `linear-gradient(135deg, ${THEME.tealDark}, ${THEME.teal})`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <Map size={32} color={THEME.gold} style={{ marginBottom: 8 }} />
              <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>{l.venue}</div>
              <div style={{ fontSize: 12, color: THEME.goldLight, marginTop: 4 }}>{l.venueArea}</div>
            </div>
          </div>
          <div style={S.card}>
            <div style={{ fontSize: 14, fontWeight: 700, color: THEME.tealDark, marginBottom: 8 }}>{l.accessInfo}</div>
            <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.7 }}>{l.address}</div>
            <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.7, marginTop: 4 }}>{l.accessDetails}</div>
          </div>
          <div style={S.card}>
            <div style={{ fontSize: 14, fontWeight: 700, color: THEME.tealDark, marginBottom: 12 }}>{l.floorGuide}</div>
            {Object.entries(l.tracks).map(([key, name]) => (
              <div key={key} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #f1f0ec" }}>
                <div style={{ width: 12, height: 12, borderRadius: 3, background: trackColors[key] }} />
                <span style={{ fontSize: 14, color: "#334155", fontWeight: 600 }}>{name}</span>
              </div>
            ))}
          </div>
          <div style={{ ...S.card, display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#3a7a5e" }} />
            <span style={{ fontSize: 13, color: "#475569" }}>{l.wifiInfo}</span>
          </div>
        </div>
      );

      // ─── Tab: Info ───────────────────────────────────────────────
      const renderInfo = () => (
        <div style={{ padding: 16, paddingBottom: 80 }}>
          <div style={S.sectionTitle}>{l.generalInfo}</div>
          {[
            { title: l.registration, content: l.regDesk, icon: <User size={18} color={THEME.gold} /> },
            { title: l.lunch, content: l.lunchInfo, icon: <Clock size={18} color={THEME.gold} /> },
            { title: l.social, content: l.socialInfo, icon: <Users size={18} color={THEME.gold} /> },
            { title: l.cme, content: l.cmeInfo, icon: <Star size={18} color={THEME.gold} /> },
            { title: l.emergencyContact, content: l.emergencyPhone, icon: <Info size={18} color={THEME.red} /> },
          ].map((item, i) => (
            <div key={i} style={S.card}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: THEME.goldBg, display: "flex", alignItems: "center", justifyContent: "center" }}>{item.icon}</div>
                <div style={{ fontSize: 15, fontWeight: 700, color: THEME.tealDark }}>{item.title}</div>
              </div>
              <p style={{ fontSize: 13, color: "#475569", lineHeight: 1.7, margin: 0, paddingLeft: 46 }}>{item.content}</p>
            </div>
          ))}
          <div style={{ background: THEME.tealDark, borderRadius: "16px 16px 0 0", padding: "24px 20px 16px", marginTop: 8 }}>
            <div style={{ textAlign: "center" }}>
              <img src={LOGO_WHITE} alt="JaVECCS" style={{ height: 36, marginBottom: 12 }} />
              <div style={{ fontSize: 12, color: THEME.textLight, lineHeight: 1.6, marginBottom: 12 }}>{l.hostedBy}</div>
              <div style={{ width: 40, height: 2, background: THEME.gold, margin: "0 auto 12px", borderRadius: 1 }} />
              <div style={{ fontSize: 11, color: THEME.textMuted, marginBottom: 4 }}>support@javeccs.org</div>
              <div style={{ fontSize: 11, color: THEME.textMuted, marginBottom: 4 }}>www.javeccs.com</div>
              <div style={{ fontSize: 10, color: THEME.textMuted, marginTop: 8, opacity: 0.6 }}>&copy; 2027 JaVECCS. All rights reserved.</div>
            </div>
          </div>
        </div>
      );

      const tabContent = { home: renderHome, schedule: renderSchedule, venue: renderVenue, info: renderInfo };
      const navItems = [
        { key: "home", icon: Home, label: l.nav.home },
        { key: "schedule", icon: Calendar, label: l.nav.schedule },
        { key: "venue", icon: Map, label: l.nav.venue },
        { key: "info", icon: Info, label: l.nav.info },
      ];

      return (
        <div style={S.app}>
          <div style={S.header}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <img src={LOGO_WHITE} alt="JaVECCS" style={{ height: 32 }} />
              <div><div style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.2 }}>JaVECCS 2027</div><div style={{ fontSize: 10, color: THEME.goldLight }}>{l.dates}</div></div>
            </div>
            <button onClick={toggleLang} style={S.langBtn}><Globe size={14} />{lang === "en" ? "日本語" : "English"}</button>
          </div>
          {tabContent[tab]()}
          <div style={S.bottomNav}>
            {navItems.map(({ key, icon: Icon, label }) => (
              <button key={key} onClick={() => setTab(key)} style={S.navItem(tab === key)}><Icon size={20} /><span>{label}</span></button>
            ))}
          </div>
        </div>
      );
    }

    e.render(<JaVECCSApp />);

    // ─── Service Worker Registration ───────────────────────────────
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("data:application/javascript,%0Aconst%20CACHE_NAME%20%3D%20%27javeccs-2027-v1%27%3B%0Aconst%20urlsToCache%20%3D%20%5B%27%2F%27%5D%3B%0A%0Aself.addEventListener%28%27install%27%2C%20event%20%3D%3E%20%7B%0A%20%20event.waitUntil%28%0A%20%20%20%20caches.open%28CACHE_NAME%29.then%28cache%20%3D%3E%20%7B%0A%20%20%20%20%20%20return%20cache.addAll%28urlsToCache%29%3B%0A%20%20%20%20%7D%29%0A%20%20%29%3B%0A%20%20self.skipWaiting%28%29%3B%0A%7D%29%3B%0A%0Aself.addEventListener%28%27activate%27%2C%20event%20%3D%3E%20%7B%0A%20%20event.waitUntil%28%0A%20%20%20%20caches.keys%28%29.then%28cacheNames%20%3D%3E%20%7B%0A%20%20%20%20%20%20return%20Promise.all%28%0A%20%20%20%20%20%20%20%20cacheNames.map%28cacheName%20%3D%3E%20%7B%0A%20%20%20%20%20%20%20%20%20%20if%20%28cacheName%20%21%3D%3D%20CACHE_NAME%29%20%7B%0A%20%20%20%20%20%20%20%20%20%20%20%20return%20caches.delete%28cacheName%29%3B%0A%20%20%20%20%20%20%20%20%20%20%7D%0A%20%20%20%20%20%20%20%20%7D%29%0A%20%20%20%20%20%20%29%3B%0A%20%20%20%20%7D%29%0A%20%20%29%3B%0A%20%20self.clients.claim%28%29%3B%0A%7D%29%3B%0A%0Aself.addEventListener%28%27fetch%27%2C%20event%20%3D%3E%20%7B%0A%20%20if%20%28event.request.method%20%21%3D%3D%20%27GET%27%29%20return%3B%0A%20%20event.respondWith%28%0A%20%20%20%20caches.match%28event.request%29.then%28response%20%3D%3E%20%7B%0A%20%20%20%20%20%20return%20response%20%7C%7C%20fetch%28event.request%29.then%28res%20%3D%3E%20%7B%0A%20%20%20%20%20%20%20%20return%20caches.open%28CACHE_NAME%29.then%28cache%20%3D%3E%20%7B%0A%20%20%20%20%20%20%20%20%20%20cache.put%28event.request%2C%20res.clone%28%29%29%3B%0A%20%20%20%20%20%20%20%20%20%20return%20res%3B%0A%20%20%20%20%20%20%20%20%7D%29%3B%0A%20%20%20%20%20%20%7D%29.catch%28%28%29%20%3D%3E%20caches.match%28%27%2F%27%29%29%3B%0A%20%20%20%20%7D%29%0A%20%20%29%3B%0A%7D%29%3B%0A", { scope: "/" }).catch(() => {});
    }
  </script>
</body>
</html>
